<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>EasyPrompter Connection</title>
    <link rel="stylesheet" href="https://sdpi-components.dev/css/sdpi.css" />
    <style>
      .sdpi-wrapper { overflow-y: auto; }
      .ep-status { display: flex; align-items: center; gap: 8px; padding: 8px 16px; margin: 4px 0; font-size: 12px; }
      .ep-status-dot { width: 8px; height: 8px; border-radius: 50%; background: #ff4444; flex-shrink: 0; }
      .ep-status-dot.connected { background: #44ff44; }
      .ep-branding { text-align: center; padding: 12px 0 4px; opacity: 0.6; font-size: 11px; }
      .ep-branding a { color: inherit; text-decoration: none; }
      .ep-branding a:hover { text-decoration: underline; }
    </style>
  </head>
  <body>
    <div class="sdpi-wrapper">
      <div type="text" class="sdpi-item">
        <div class="sdpi-item-label">Server URL</div>
        <input id="serverUrl" class="sdpi-item-value" type="url" placeholder="https://app.easyprompter.com" required />
      </div>
      <div class="sdpi-item">
        <div class="sdpi-item-label">Status</div>
        <div class="ep-status">
          <span id="statusDot" class="ep-status-dot"></span>
          <span id="statusText">Not connected</span>
        </div>
      </div>
      <div class="ep-branding">
        <a href="https://easyprompter.com" target="_blank">EasyPrompter — Professional Teleprompter</a>
      </div>
    </div>
    <script>
      let websocket = null;
      let uuid = null;
      let actionInfo = null;
      let settings = {};

      function connectElgatoStreamDeckSocket(inPort, inPropertyInspectorUUID, inRegisterEvent, inInfo, inActionInfo) {
        uuid = inPropertyInspectorUUID;
        actionInfo = JSON.parse(inActionInfo);
        settings = actionInfo.payload.settings || {};

        const serverUrlInput = document.getElementById("serverUrl");
        if (settings.serverUrl) { serverUrlInput.value = settings.serverUrl; }

        websocket = new WebSocket("ws://127.0.0.1:" + inPort);
        websocket.onopen = function () {
          websocket.send(JSON.stringify({ event: inRegisterEvent, uuid: inPropertyInspectorUUID }));
        };
        websocket.onmessage = function (evt) {
          const jsonObj = JSON.parse(evt.data);
          if (jsonObj.event === "didReceiveSettings" && jsonObj.payload && jsonObj.payload.settings) {
            settings = jsonObj.payload.settings;
            serverUrlInput.value = settings.serverUrl || "";
            updateConnectionStatus(settings.connected || false);
          }
        };

        serverUrlInput.addEventListener("change", function () {
          settings.serverUrl = this.value.trim();
          saveSettings();
        });
        serverUrlInput.addEventListener("blur", function () {
          if (this.value.trim() !== (settings.serverUrl || "")) {
            settings.serverUrl = this.value.trim();
            saveSettings();
          }
        });
      }

      function saveSettings() {
        if (websocket && websocket.readyState === WebSocket.OPEN) {
          websocket.send(JSON.stringify({ event: "setSettings", context: uuid, payload: settings }));
        }
      }

      function updateConnectionStatus(connected) {
        const dot = document.getElementById("statusDot");
        const text = document.getElementById("statusText");
        if (connected) { dot.classList.add("connected"); text.textContent = "Connected"; }
        else { dot.classList.remove("connected"); text.textContent = settings.serverUrl ? "Connecting..." : "Not connected"; }
      }
    </script>
  </body>
</html>
