<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>EasyPrompter Marketplace Thumbnail</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1920px;
    height: 960px;
    overflow: hidden;
    font-family: 'Inter', -apple-system, sans-serif;
    position: relative;
    background: #070c18;
  }

  .bg {
    position: absolute;
    inset: 0;
    z-index: 0;
  }
  .bg img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  .container {
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    position: relative;
    z-index: 1;
  }

  .left {
    width: 46%;
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    justify-content: center;
    padding-left: 100px;
    padding-right: 20px;
  }

  .textmark {
    width: 520px;
    height: auto;
    margin-bottom: 48px;
    filter: drop-shadow(0 2px 20px rgba(0, 200, 220, 0.12));
  }

  .tagline {
    font-size: 36px;
    font-weight: 300;
    color: rgba(90, 215, 225, 0.9);
    letter-spacing: 0.3px;
    margin-bottom: 22px;
    line-height: 1.2;
  }

  .features {
    font-size: 20px;
    font-weight: 400;
    color: rgba(255, 255, 255, 0.4);
    letter-spacing: 2.5px;
    text-transform: uppercase;
  }

  .right {
    width: 54%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
  }

  .device {
    height: 92%;
    width: auto;
    filter: drop-shadow(0 20px 50px rgba(0, 0, 0, 0.5));
  }
</style>
</head>
<body>
  <div class="bg">
    <img src="assets/bg-streaks.jpg" alt="">
  </div>

  <div class="container">
    <div class="left">
      <img class="textmark" src="assets/textmark.png" alt="EasyPrompter">
      <div class="tagline">Professional Teleprompter Control</div>
      <div class="features">19 Actions · Dial Support · Live Feedback</div>
    </div>

    <div class="right">
      <img class="device" src="assets/device-transparent.png" alt="Stream Deck+ with EasyPrompter">
    </div>
  </div>
</body>
</html>
