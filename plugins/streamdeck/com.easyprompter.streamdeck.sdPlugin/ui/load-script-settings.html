<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Load Script Settings</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        font-size: 12px;
        color: #d8d8d8;
        background: transparent;
        padding: 8px 0;
      }
      .field { padding: 6px 16px; }
      .field label {
        display: block;
        font-size: 11px;
        color: #9e9e9e;
        margin-bottom: 4px;
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }
      .field input, .field select {
        width: 100%;
        padding: 6px 8px;
        border: 1px solid #3a3a3a;
        border-radius: 4px;
        background: #1a1a1a;
        color: #e0e0e0;
        font-size: 12px;
        outline: none;
        transition: border-color 0.2s;
      }
      .field input:focus, .field select:focus { border-color: #00e5ff; }
      .field input::placeholder { color: #555; }
      .field select option { background: #1a1a1a; color: #e0e0e0; }
      .status-row {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 8px 16px;
        margin: 4px 0;
      }
      .status-dot {
        width: 8px; height: 8px;
        border-radius: 50%;
        flex-shrink: 0;
        transition: background 0.3s;
      }
      .status-dot.disconnected { background: #ff4444; }
      .status-dot.connecting { background: #ffaa00; }
      .status-dot.connected { background: #44ff44; }
      .help-text {
        padding: 4px 16px;
        font-size: 10px;
        color: #777;
        line-height: 1.4;
      }
      .divider {
        border: none;
        border-top: 1px solid #2a2a2a;
        margin: 6px 16px;
      }
      .section-label {
        padding: 8px 16px 2px;
        font-size: 11px;
        color: #7cacf8;
        font-weight: 600;
        letter-spacing: 0.3px;
      }
      .branding {
        text-align: center;
        padding: 12px 0 4px;
        font-size: 10px;
        color: #555;
      }
      .branding a { color: #555; text-decoration: none; }
      .branding a:hover { color: #00e5ff; }
      .collapsible-header {
        display: flex; align-items: center; justify-content: space-between;
        cursor: pointer; padding: 6px 16px; user-select: none;
      }
      .collapsible-header .section-title {
        font-size: 11px; color: #7cacf8; font-weight: 600; letter-spacing: 0.3px;
      }
      .collapsible-header .chevron {
        font-size: 10px; color: #999; transition: transform 0.2s;
      }
      .collapsible-header.collapsed .chevron { transform: rotate(-90deg); }
      .collapsible-body {
        overflow: hidden; max-height: 500px; transition: max-height 0.25s ease;
      }
      .collapsible-body.collapsed { max-height: 0; }
      .refresh-btn {
        display: inline-block;
        padding: 4px 10px;
        margin-left: 8px;
        font-size: 10px;
        border: 1px solid #3a3a3a;
        border-radius: 4px;
        background: #2a2a2a;
        color: #d8d8d8;
        cursor: pointer;
        transition: background 0.2s, border-color 0.2s;
        vertical-align: middle;
      }
      .refresh-btn:hover { background: #3a3a3a; border-color: #00e5ff; }
      .refresh-btn:disabled { opacity: 0.4; cursor: not-allowed; }
      .label-row {
        display: flex;
        align-items: center;
        gap: 4px;
      }
    </style>
  </head>
  <body>
    <!-- Per-action script settings -->
    <div class="section-label">Script</div>
    <div class="field">
      <div class="label-row">
        <label style="margin-bottom:0">Select Script</label>
        <button id="refreshBtn" class="refresh-btn" title="Refresh script list">↻ Refresh</button>
      </div>
      <select id="scriptSelect" style="margin-top:4px">
        <option value="">— Select a script —</option>
      </select>
    </div>
    <div class="field">
      <label>Display Label (optional)</label>
      <input id="scriptLabel" type="text" placeholder="Custom label for the button" />
    </div>
    <div class="field">
      <label>Title Font Size</label>
      <select id="titleFontSize">
        <option value="16">Small</option>
        <option value="20" selected>Medium (default)</option>
        <option value="24">Large</option>
        <option value="28">Extra Large</option>
      </select>
    </div>
    <div class="help-text">
      Choose a script from your recent list.<br/>
      The label overrides the script title on the button.
    </div>

    <hr class="divider" />

    <!-- Connection status -->
    <div class="status-row">
      <span id="statusDot" class="status-dot disconnected"></span>
      <span id="statusText">Not configured</span>
    </div>
    <hr class="divider" />

    <!-- Global plugin config (collapsible) -->
    <div id="configHeader" class="collapsible-header">
      <span class="section-title">Plugin Config</span>
      <span class="chevron">▼</span>
    </div>
    <div id="configBody" class="collapsible-body">
      <div class="field">
        <label>Server URL</label>
        <input id="serverUrl" type="url" placeholder="https://app.easyprompter.com" />
      </div>
      <div class="field">
        <label>Integration Key</label>
        <input id="apiKey" type="password" placeholder="ep_rk_..." />
      </div>
      <div class="help-text">
        Find your integration key in EasyPrompter under<br/>Settings → Integrations.
      </div>
    </div>
    <div class="branding">
      <a href="https://easyprompter.com" target="_blank">EasyPrompter — Professional Teleprompter</a>
    </div>

    <script>
      let websocket = null;
      let piUUID = null;
      let globalSettings = {};
      let actionSettings = {};
      let scriptsList = []; // cached scripts from API

      function connectElgatoStreamDeckSocket(inPort, inPropertyInspectorUUID, inRegisterEvent, inInfo, inActionInfo) {
        piUUID = inPropertyInspectorUUID;
        const ai = JSON.parse(inActionInfo);

        // Load per-action settings
        actionSettings = (ai && ai.payload && ai.payload.settings) || {};
        document.getElementById("scriptLabel").value = actionSettings.scriptLabel || "";
        document.getElementById("titleFontSize").value = String(actionSettings.titleFontSize || 20);

        websocket = new WebSocket("ws://127.0.0.1:" + inPort);

        websocket.onopen = function () {
          websocket.send(JSON.stringify({ event: inRegisterEvent, uuid: piUUID }));
          websocket.send(JSON.stringify({ event: "getGlobalSettings", context: piUUID }));
        };

        websocket.onmessage = function (evt) {
          const msg = JSON.parse(evt.data);
          if (msg.event === "didReceiveGlobalSettings" && msg.payload && msg.payload.settings) {
            globalSettings = msg.payload.settings;
            document.getElementById("serverUrl").value = globalSettings.serverUrl || "";
            document.getElementById("apiKey").value = globalSettings.apiKey || "";
            updateStatus();
            // Auto-collapse config if configured
            if (globalSettings.serverUrl && globalSettings.apiKey) {
              document.getElementById("configHeader").classList.add("collapsed");
              document.getElementById("configBody").classList.add("collapsed");
              // Auto-fetch scripts on first load
              fetchScripts();
            }
          }
          if (msg.event === "didReceiveSettings" && msg.payload && msg.payload.settings) {
            actionSettings = msg.payload.settings;
            document.getElementById("scriptLabel").value = actionSettings.scriptLabel || "";
            document.getElementById("titleFontSize").value = String(actionSettings.titleFontSize || 20);
            syncDropdownSelection();
          }
        };

        // Per-action settings
        document.getElementById("scriptSelect").addEventListener("change", onScriptSelected);
        document.getElementById("scriptLabel").addEventListener("change", saveActionSettings);
        document.getElementById("titleFontSize").addEventListener("change", saveActionSettings);

        // Global settings
        document.getElementById("serverUrl").addEventListener("change", saveGlobalSettings);
        document.getElementById("apiKey").addEventListener("change", function () {
          saveGlobalSettings();
          // Re-fetch scripts when integration key changes
          setTimeout(fetchScripts, 300);
        });

        // Refresh button
        document.getElementById("refreshBtn").addEventListener("click", fetchScripts);

        // Collapsible toggle
        document.getElementById("configHeader").addEventListener("click", function () {
          this.classList.toggle("collapsed");
          document.getElementById("configBody").classList.toggle("collapsed");
        });
      }

      function onScriptSelected() {
        const select = document.getElementById("scriptSelect");
        const selectedId = select.value;
        const selectedTitle = select.options[select.selectedIndex]?.text || "";

        actionSettings.scriptId = selectedId;
        // Auto-fill label with script title if label is empty
        if (!actionSettings.scriptLabel && selectedId) {
          actionSettings.scriptLabel = selectedTitle;
          document.getElementById("scriptLabel").value = selectedTitle;
        }
        saveActionSettingsToSD();
      }

      function saveActionSettings() {
        actionSettings.scriptLabel = document.getElementById("scriptLabel").value.trim();
        actionSettings.titleFontSize = parseInt(document.getElementById("titleFontSize").value, 10) || 20;
        saveActionSettingsToSD();
      }

      function saveActionSettingsToSD() {
        if (websocket && websocket.readyState === WebSocket.OPEN) {
          websocket.send(JSON.stringify({
            event: "setSettings",
            context: piUUID,
            payload: actionSettings,
          }));
        }
      }

      function saveGlobalSettings() {
        globalSettings.serverUrl = document.getElementById("serverUrl").value.trim();
        globalSettings.apiKey = document.getElementById("apiKey").value.trim();
        if (websocket && websocket.readyState === WebSocket.OPEN) {
          websocket.send(JSON.stringify({
            event: "setGlobalSettings",
            context: piUUID,
            payload: globalSettings,
          }));
        }
        updateStatus();
      }

      function updateStatus() {
        const dot = document.getElementById("statusDot");
        const text = document.getElementById("statusText");
        dot.className = "status-dot";
        if (!globalSettings.serverUrl || !globalSettings.apiKey) {
          dot.classList.add("disconnected");
          text.textContent = "Enter server URL and integration key";
        } else {
          const status = globalSettings.connectionStatus || "disconnected";
          if (status === "active") {
            dot.classList.add("connected");
            text.textContent = "Connected";
          } else if (status === "waiting") {
            dot.classList.add("connected");
            text.textContent = "Connected — waiting for session";
          } else if (status === "error") {
            dot.classList.add("disconnected");
            text.textContent = "Connection error";
          } else {
            dot.classList.add("disconnected");
            text.textContent = "Connecting…";
          }
        }
      }

      async function fetchScripts() {
        const btn = document.getElementById("refreshBtn");
        const select = document.getElementById("scriptSelect");

        if (!globalSettings.serverUrl || !globalSettings.apiKey) {
          select.innerHTML = '<option value="">— Configure connection first —</option>';
          return;
        }

        btn.disabled = true;
        btn.textContent = "⏳";
        select.innerHTML = '<option value="">Loading…</option>';

        try {
          const url = globalSettings.serverUrl.replace(/\/+$/, "") + "/api/remote-keys/scripts";
          const resp = await fetch(url, {
            headers: { "Authorization": "Bearer " + globalSettings.apiKey },
          });

          if (!resp.ok) {
            throw new Error("HTTP " + resp.status);
          }

          const data = await resp.json();
          scriptsList = data.scripts || [];

          // Populate dropdown
          select.innerHTML = '<option value="">— Select a script —</option>';
          for (const s of scriptsList) {
            const opt = document.createElement("option");
            opt.value = s.id;
            opt.textContent = s.title || "(Untitled)";
            select.appendChild(opt);
          }

          syncDropdownSelection();
        } catch (err) {
          console.error("Failed to fetch scripts:", err);
          select.innerHTML = '<option value="">— Failed to load scripts —</option>';
          // Keep current scriptId if we had one
          if (actionSettings.scriptId) {
            const opt = document.createElement("option");
            opt.value = actionSettings.scriptId;
            opt.textContent = actionSettings.scriptLabel || actionSettings.scriptId;
            opt.selected = true;
            select.appendChild(opt);
          }
        } finally {
          btn.disabled = false;
          btn.textContent = "↻ Refresh";
        }
      }

      /** Sync the dropdown selection to match the current actionSettings.scriptId */
      function syncDropdownSelection() {
        const select = document.getElementById("scriptSelect");
        if (actionSettings.scriptId) {
          // Check if the ID exists in the dropdown
          let found = false;
          for (const opt of select.options) {
            if (opt.value === actionSettings.scriptId) {
              opt.selected = true;
              found = true;
              break;
            }
          }
          // If not found (e.g. scripts not loaded yet), add a placeholder option
          if (!found && actionSettings.scriptId) {
            const opt = document.createElement("option");
            opt.value = actionSettings.scriptId;
            opt.textContent = actionSettings.scriptLabel || actionSettings.scriptId;
            opt.selected = true;
            select.appendChild(opt);
          }
        }
      }
    </script>
  </body>
</html>
