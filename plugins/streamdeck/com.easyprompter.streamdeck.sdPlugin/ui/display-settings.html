<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>EasyPrompter Display Settings</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        font-size: 12px;
        color: #d8d8d8;
        background: transparent;
        padding: 8px 0;
      }
      .field { padding: 6px 16px; }
      .field label {
        display: block;
        font-size: 11px;
        color: #9e9e9e;
        margin-bottom: 4px;
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }
      .field input[type="url"],
      .field input[type="password"] {
        width: 100%;
        padding: 6px 8px;
        border: 1px solid #3a3a3a;
        border-radius: 4px;
        background: #1a1a1a;
        color: #e0e0e0;
        font-size: 12px;
        outline: none;
        transition: border-color 0.2s;
      }
      .field input:focus { border-color: #00e5ff; }
      .field input::placeholder { color: #555; }
      .toggle-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 8px 16px;
      }
      .toggle-label {
        font-size: 12px;
        color: #d8d8d8;
      }
      .toggle {
        position: relative;
        width: 36px;
        height: 20px;
      }
      .toggle input {
        opacity: 0;
        width: 0;
        height: 0;
      }
      .toggle-slider {
        position: absolute;
        cursor: pointer;
        top: 0; left: 0; right: 0; bottom: 0;
        background: #3a3a3a;
        border-radius: 10px;
        transition: background 0.2s;
      }
      .toggle-slider:before {
        content: "";
        position: absolute;
        height: 16px;
        width: 16px;
        left: 2px;
        bottom: 2px;
        background: #aaa;
        border-radius: 50%;
        transition: transform 0.2s, background 0.2s;
      }
      .toggle input:checked + .toggle-slider {
        background: #00e5ff;
      }
      .toggle input:checked + .toggle-slider:before {
        transform: translateX(16px);
        background: #fff;
      }
      .divider {
        border: none;
        border-top: 1px solid #2a2a2a;
        margin: 6px 16px;
      }
      .status-row {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 8px 16px;
      }
      .status-dot {
        width: 8px; height: 8px;
        border-radius: 50%;
        flex-shrink: 0;
        background: #ff4444;
      }
      .status-dot.connected { background: #44ff44; }
      .help-text {
        padding: 4px 16px;
        font-size: 10px;
        color: #777;
        line-height: 1.4;
      }
      .branding {
        text-align: center;
        padding: 12px 0 4px;
        font-size: 10px;
        color: #555;
      }
      .branding a { color: #555; text-decoration: none; }
      .branding a:hover { color: #00e5ff; }
      .collapsible-header {
        display: flex; align-items: center; justify-content: space-between;
        cursor: pointer; padding: 6px 16px; user-select: none;
      }
      .collapsible-header .section-title {
        font-size: 11px; color: #7cacf8; font-weight: 600; letter-spacing: 0.3px;
      }
      .collapsible-header .chevron {
        font-size: 10px; color: #999; transition: transform 0.2s;
      }
      .collapsible-header.collapsed .chevron { transform: rotate(-90deg); }
      .collapsible-body {
        overflow: hidden; max-height: 500px; transition: max-height 0.25s ease;
      }
      .collapsible-body.collapsed { max-height: 0; }
    </style>
  </head>
  <body>
    <div class="toggle-row">
      <span class="toggle-label">Show Branding</span>
      <label class="toggle">
        <input type="checkbox" id="showBranding" checked />
        <span class="toggle-slider"></span>
      </label>
    </div>
    <hr class="divider" />

    <!-- Collapsible Plugin Config -->
    <div id="configHeader" class="collapsible-header">
      <span class="section-title">Plugin Config</span>
      <span class="chevron">▼</span>
    </div>
    <div id="configBody" class="collapsible-body">
      <div class="field">
        <label>Server URL</label>
        <input id="serverUrl" type="url" placeholder="https://app.easyprompter.com" />
      </div>
      <div class="field">
        <label>API Key</label>
        <input id="apiKey" type="password" placeholder="ep_rk_..." />
      </div>
      <div class="help-text">
        Find your API key in EasyPrompter under<br/>Settings → Stream Deck / Remote Control.
      </div>
    </div>

    <div class="status-row">
      <span id="statusDot" class="status-dot"></span>
      <span id="statusText">Not configured</span>
    </div>
    <div class="branding">
      <a href="https://easyprompter.com" target="_blank">EasyPrompter — Professional Teleprompter</a>
    </div>

    <script>
      let websocket = null;
      let piUUID = null;
      let globalSettings = {};
      let actionSettings = {};

      function connectElgatoStreamDeckSocket(inPort, inPropertyInspectorUUID, inRegisterEvent, _inInfo, inActionInfo) {
        piUUID = inPropertyInspectorUUID;

        try {
          const info = JSON.parse(inActionInfo);
          actionSettings = (info.payload && info.payload.settings) || {};
        } catch (_e) { /* ignore */ }

        const brandingToggle = document.getElementById("showBranding");
        brandingToggle.checked = actionSettings.showBranding !== false; // default true

        websocket = new WebSocket("ws://127.0.0.1:" + inPort);

        websocket.onopen = function () {
          websocket.send(JSON.stringify({ event: inRegisterEvent, uuid: piUUID }));
          websocket.send(JSON.stringify({ event: "getGlobalSettings", context: piUUID }));
        };

        websocket.onmessage = function (evt) {
          const msg = JSON.parse(evt.data);
          if (msg.event === "didReceiveGlobalSettings" && msg.payload && msg.payload.settings) {
            globalSettings = msg.payload.settings;
            document.getElementById("serverUrl").value = globalSettings.serverUrl || "";
            document.getElementById("apiKey").value = globalSettings.apiKey || "";
            updateStatus();
            // Auto-collapse if both fields are populated
            if (globalSettings.serverUrl && globalSettings.apiKey) {
              document.getElementById("configHeader").classList.add("collapsed");
              document.getElementById("configBody").classList.add("collapsed");
            }
          }
          if (msg.event === "didReceiveSettings" && msg.payload && msg.payload.settings) {
            actionSettings = msg.payload.settings;
            brandingToggle.checked = actionSettings.showBranding !== false;
          }
        };

        document.getElementById("serverUrl").addEventListener("change", saveGlobalSettings);
        document.getElementById("apiKey").addEventListener("change", saveGlobalSettings);

        brandingToggle.addEventListener("change", function () {
          actionSettings.showBranding = this.checked;
          saveActionSettings();
        });

        // Collapsible toggle
        document.getElementById("configHeader").addEventListener("click", function () {
          this.classList.toggle("collapsed");
          document.getElementById("configBody").classList.toggle("collapsed");
        });
      }

      function saveGlobalSettings() {
        globalSettings.serverUrl = document.getElementById("serverUrl").value.trim();
        globalSettings.apiKey = document.getElementById("apiKey").value.trim();
        if (websocket && websocket.readyState === WebSocket.OPEN) {
          websocket.send(JSON.stringify({ event: "setGlobalSettings", context: piUUID, payload: globalSettings }));
        }
        updateStatus();
      }

      function saveActionSettings() {
        if (websocket && websocket.readyState === WebSocket.OPEN) {
          websocket.send(JSON.stringify({ event: "setSettings", context: piUUID, payload: actionSettings }));
        }
      }

      function updateStatus() {
        const dot = document.getElementById("statusDot");
        const text = document.getElementById("statusText");
        dot.className = "status-dot";
        if (!globalSettings.serverUrl || !globalSettings.apiKey) {
          text.textContent = "Enter server URL and API key";
        } else {
          dot.classList.add("connected");
          text.textContent = "Configured ✓";
        }
      }
    </script>
  </body>
</html>
